name: CI — isolation attestation & memory evals

# Proves the ethical wall holds and the four memory behaviors score, on every push.
# Requires one repo SECRET (not a Variable): DASHSCOPE_API_KEY
#   Settings → Secrets and variables → Actions → *Secrets* tab → New repository secret
# The evals job is heavier (real LLM calls) so it runs on main + manual dispatch only.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  isolation-attestation:
    name: Isolation attestation (the ethical wall)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check DASHSCOPE_API_KEY secret is present
        env:
          KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::DASHSCOPE_API_KEY secret is empty. Add it under Settings →"
            echo "::error::Secrets and variables → Actions → the *Secrets* tab (not Variables)."
            exit 1
          fi
          echo "DASHSCOPE_API_KEY=$KEY" > .env
          echo "secret present (len=${#KEY})"

      - name: Start backend (waits for postgres + api healthchecks)
        run: docker compose up -d --build --wait --wait-timeout 240 postgres qdrant redis api

      - name: Confirm provider is live (llm_ok)
        run: |
          for i in $(seq 1 40); do
            if curl -fsS --max-time 15 http://localhost:8000/health | grep -q '"llm_ok": *true'; then
              echo "provider live"; exit 0
            fi
            sleep 3
          done
          echo "::error::/health never reported llm_ok:true"; exit 1

      - name: Run isolation guard test  🔒
        run: docker compose exec -T api pytest -q tests/test_isolation.py

      - name: Diagnostics on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color api postgres qdrant

  memory-evals:
    name: Memory behavior evals (quantified)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Check DASHSCOPE_API_KEY secret is present
        env:
          KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::DASHSCOPE_API_KEY secret is empty (add it under Actions → Secrets)."; exit 1
          fi
          echo "DASHSCOPE_API_KEY=$KEY" > .env

      - name: Start backend (waits for healthchecks)
        run: docker compose up -d --build --wait --wait-timeout 240 postgres qdrant redis api

      - name: Confirm provider is live
        run: |
          for i in $(seq 1 40); do
            curl -fsS --max-time 15 http://localhost:8000/health | grep -q '"llm_ok": *true' && exit 0
            sleep 3
          done
          echo "::error::/health never reported llm_ok:true"; exit 1

      - name: Run behavior evals (gates on isolation + overall score)
        run: EVAL_API_BASE=http://localhost:8000 python3 evals/run_evals.py

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/REPORT.md

      - name: Diagnostics on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color api postgres qdrant
