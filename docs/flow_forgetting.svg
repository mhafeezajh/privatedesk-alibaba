<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/></marker><marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/></marker></defs><rect x="0" y="0" width="1000" height="600" fill="#ffffff"/><text x="500.0" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Three Forgetting Mechanisms</text><text x="500.0" y="60" text-anchor="middle" font-size="13" fill="#64748b">what keeps memory current instead of an ever-growing junk drawer</text><rect x="65" y="110" width="270" height="280" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/><text x="200" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">1 · Supersession</text><text x="200" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">write-time</text><text x="200" y="200" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">New fact contradicts /</text><text x="200" y="224" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">updates an existing one</text><text x="200" y="248" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">(qwen-plus adjudicates)</text><text x="200" y="272" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">→ old marked superseded</text><text x="200" y="296" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">→ agent uses new truth</text><line x1="200" y1="390" x2="200" y2="446" stroke="#f59e0b" stroke-width="2" marker-end="url(#a)"/><rect x="365" y="110" width="270" height="280" rx="12" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/><text x="500" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#0369a1">2 · Expiry</text><text x="500" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">maintenance sweep</text><text x="500" y="200" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">Memory has expires_at</text><text x="500" y="224" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">in the past</text><text x="500" y="248" text-anchor="middle" font-size="12" font-weight="400" fill="#334155"></text><text x="500" y="272" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">→ marked expired</text><text x="500" y="296" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">→ dropped from recall</text><line x1="500" y1="390" x2="500" y2="446" stroke="#0ea5e9" stroke-width="2" marker-end="url(#a)"/><rect x="665" y="110" width="270" height="280" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/><text x="800" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#0f766e">3 · Salience decay</text><text x="800" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">maintenance sweep</text><text x="800" y="200" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">salience &lt; 0.2 AND</text><text x="800" y="224" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">unused &gt; 30 days</text><text x="800" y="248" text-anchor="middle" font-size="12" font-weight="400" fill="#334155"></text><text x="800" y="272" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">→ demoted / pruned</text><text x="800" y="296" text-anchor="middle" font-size="12" font-weight="400" fill="#334155">→ out of active recall</text><line x1="800" y1="390" x2="800" y2="446" stroke="#0d9488" stroke-width="2" marker-end="url(#a)"/><rect x="240.0" y="446" width="520" height="60" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/><text x="500" y="472.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#065f46">Excluded from active recall set</text><text x="500" y="490.0" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">every transition is written to the audit log · inspector shows status badges live</text></svg>