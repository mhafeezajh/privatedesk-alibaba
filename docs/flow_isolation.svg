<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 660" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/></marker><marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/></marker></defs><rect x="0" y="0" width="1040" height="660" fill="#ffffff"/><text x="520.0" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Isolation Enforcement</text><text x="520.0" y="60" text-anchor="middle" font-size="13" fill="#64748b">one chokepoint · every read namespace-scoped · the wall is provable</text><rect x="60.0" y="110" width="320" height="60" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/><text x="220" y="136.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#3730a3">Principal A</text><text x="220" y="154.0" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">namespace: ns_a   (e.g. a family member)</text><rect x="660.0" y="110" width="320" height="60" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/><text x="820" y="136.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#3730a3">Principal B</text><text x="820" y="154.0" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">namespace: ns_b   (e.g. a SaaS end-user)</text><rect x="340.0" y="254" width="360" height="64" rx="9" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.5"/><text x="520" y="282.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#b45309">Isolation chokepoint</text><text x="520" y="300.0" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">qdrant_client.search(namespace, …) — the ONLY vector reader</text><line x1="220" y1="170" x2="470" y2="254" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="300" y="219" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">query(ns=A)</text><line x1="820" y1="170" x2="570" y2="254" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="740" y="219" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">query(ns=B)</text><rect x="60.0" y="404" width="320" height="60" rx="9" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/><text x="220" y="430.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f766e">Qdrant — A's store</text><text x="220" y="448.0" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">only Principal A's vectors</text><rect x="660.0" y="404" width="320" height="60" rx="9" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/><text x="820" y="430.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f766e">Qdrant — B's store</text><text x="820" y="448.0" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">only Principal B's vectors</text><line x1="340.0" y1="318" x2="250" y2="404" stroke="#0d9488" stroke-width="2" marker-end="url(#a)"/><line x1="700.0" y1="318" x2="790" y2="404" stroke="#0d9488" stroke-width="2" marker-end="url(#a)"/><rect x="320" y="524" width="760" height="92" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/><text x="700" y="550" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">Cross-boundary attempt</text><text x="700" y="572" text-anchor="middle" font-size="11.5" font-weight="400" fill="#7f1d1d">B's agent asks for something only A told its agent → the search is scoped to B's namespace,</text><text x="700" y="590" text-anchor="middle" font-size="11.5" font-weight="400" fill="#7f1d1d">returns nothing → agent truthfully says it doesn't have that → audit logs isolation_block</text><line x1="520" y1="318" x2="520" y2="524" stroke="#ef4444" stroke-width="2" marker-end="url(#ar)"/><rect x="40" y="254" width="150" height="64" rx="10" fill="#ecfdf5" stroke="#10b981"/><text x="115" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Guard test</text><text x="115" y="300" text-anchor="middle" font-size="10" font-weight="400" fill="#065f46">100+ memories,</text><text x="115" y="314" text-anchor="middle" font-size="10" font-weight="400" fill="#065f46">zero leakage</text></svg>