<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 632" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="0" y="0" width="1240" height="632" fill="#ffffff"/>

  <text x="620" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#1e293b">What actually happens — the ethical wall holds</text>
  <text x="620" y="64" text-anchor="middle" font-size="14" fill="#64748b">The firm sues Borealis for Acme — and separately advises Borealis. The two teams must be screened.</text>

  <!-- Panel 1 -->
  <g>
    <rect x="40" y="96" width="272" height="320" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="40" y="96" width="272" height="40" rx="14" fill="#eef2ff"/><rect x="40" y="116" width="272" height="20" fill="#eef2ff"/>
    <circle cx="64" cy="116" r="12" fill="#6366f1"/><text x="64" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
    <text x="86" y="120" font-size="12.5" font-weight="700" fill="#3730a3">Acme team logs a fact</text>
    <rect x="60" y="156" width="232" height="92" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="76" y="182" font-size="13" fill="#1e293b">"Acme's authorized</text>
    <text x="76" y="202" font-size="13" fill="#1e293b">settlement ceiling</text>
    <text x="76" y="222" font-size="13" fill="#1e293b">is $4.2M."</text>
    <text x="64" y="288" font-size="11" font-weight="700" fill="#0f766e">WHAT THE SYSTEM DOES</text>
    <text x="64" y="310" font-size="12" fill="#334155">Saved to the Acme</text>
    <text x="64" y="328" font-size="12" fill="#334155">litigation matter only.</text>
    <rect x="64" y="344" width="220" height="26" rx="6" fill="#0f172a"/>
    <text x="74" y="361" font-family="monospace" font-size="11" fill="#5eead4">ns = ns_b68b...5e</text>
  </g>
  <line x1="318" y1="256" x2="354" y2="256" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="336" y="246" text-anchor="middle" font-size="9" fill="#94a3b8">later</text>

  <!-- Panel 2 -->
  <g>
    <rect x="360" y="96" width="272" height="320" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="360" y="96" width="272" height="40" rx="14" fill="#eef2ff"/><rect x="360" y="116" width="272" height="20" fill="#eef2ff"/>
    <circle cx="384" cy="116" r="12" fill="#6366f1"/><text x="384" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2</text>
    <text x="406" y="120" font-size="12.5" font-weight="700" fill="#3730a3">Borealis team asks</text>
    <rect x="380" y="156" width="232" height="92" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="396" y="182" font-size="13" fill="#1e293b">"What's Acme's</text>
    <text x="396" y="202" font-size="13" fill="#1e293b">settlement position</text>
    <text x="396" y="222" font-size="13" fill="#1e293b">against Borealis?"</text>
    <text x="384" y="288" font-size="11" font-weight="700" fill="#0f766e">WHAT THE SYSTEM DOES</text>
    <text x="384" y="310" font-size="12" fill="#334155">A different matter —</text>
    <text x="384" y="328" font-size="12" fill="#334155">a separate namespace.</text>
    <rect x="384" y="344" width="220" height="26" rx="6" fill="#0f172a"/>
    <text x="394" y="361" font-family="monospace" font-size="11" fill="#5eead4">ns = ns_7d4a...e0</text>
  </g>
  <line x1="638" y1="256" x2="674" y2="256" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>

  <!-- Panel 3 (chokepoint) -->
  <g>
    <rect x="680" y="96" width="272" height="320" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <rect x="680" y="96" width="272" height="40" rx="14" fill="#fef3c7"/><rect x="680" y="116" width="272" height="20" fill="#fef3c7"/>
    <circle cx="704" cy="116" r="12" fill="#d97706"/><text x="704" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3</text>
    <text x="726" y="120" font-size="12.5" font-weight="700" fill="#b45309">The isolation chokepoint</text>
    <text x="700" y="166" font-size="12.5" fill="#92400e">The one function that reads</text>
    <text x="700" y="184" font-size="12.5" fill="#92400e">memory searches ONLY the</text>
    <text x="700" y="202" font-size="12.5" font-weight="700" fill="#b45309">Borealis matter's namespace.</text>
    <rect x="700" y="216" width="232" height="28" rx="6" fill="#0f172a"/>
    <text x="712" y="234" font-family="monospace" font-size="11" fill="#fcd34d">search(ns = ns_7d4a...e0)</text>
    <text x="700" y="272" font-size="12.5" fill="#92400e">Acme's privileged strategy</text>
    <text x="700" y="290" font-size="12.5" fill="#92400e">lives in a different matter.</text>
    <rect x="700" y="306" width="232" height="64" rx="10" fill="#fff7ed" stroke="#fdba74"/>
    <text x="816" y="334" text-anchor="middle" font-size="22" font-weight="800" fill="#b45309">0 results</text>
    <text x="816" y="356" text-anchor="middle" font-size="11" fill="#9a3412">nothing to return — by design</text>
  </g>
  <line x1="958" y1="256" x2="994" y2="256" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>

  <!-- Panel 4 (result) -->
  <g>
    <rect x="1000" y="96" width="200" height="320" rx="14" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <rect x="1000" y="96" width="200" height="40" rx="14" fill="#ecfdf5"/><rect x="1000" y="116" width="200" height="20" fill="#ecfdf5"/>
    <circle cx="1024" cy="116" r="12" fill="#10b981"/><text x="1024" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">4</text>
    <text x="1046" y="120" font-size="12.5" font-weight="700" fill="#065f46">The wall holds</text>
    <rect x="1016" y="156" width="168" height="92" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="1100" y="186" text-anchor="middle" font-size="12.5" fill="#14532d">"I don't have</text>
    <text x="1100" y="204" text-anchor="middle" font-size="12.5" fill="#14532d">access to</text>
    <text x="1100" y="222" text-anchor="middle" font-size="12.5" fill="#14532d">that."</text>
    <text x="1100" y="286" text-anchor="middle" font-size="13" font-weight="800" fill="#065f46">Privilege</text>
    <text x="1100" y="304" text-anchor="middle" font-size="13" font-weight="800" fill="#065f46">preserved.</text>
    <rect x="1016" y="330" width="168" height="42" rx="8" fill="#ecfdf5" stroke="#86efac"/>
    <text x="1100" y="348" text-anchor="middle" font-size="10.5" fill="#065f46">audit logs:</text>
    <text x="1100" y="364" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#047857">isolation_block</text>
  </g>

  <!-- contrast -->
  <rect x="40" y="436" width="1160" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="60" y="460" font-size="12.5" fill="#475569"><tspan font-weight="700" fill="#b91c1c">The contrast: </tspan>a shared store with a matter_id filter could surface Acme's strategy to the adverse client's team on one careless query.</text>
  <text x="60" y="480" font-size="12.5" fill="#475569">PrivateDesk can't — no code path reads across the wall, and every attempt is written to the audit log.</text>

  <!-- stakes -->
  <rect x="40" y="508" width="1160" height="76" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="60" y="532" font-size="13" font-weight="800" fill="#b91c1c">Why this isn't a nice-to-have</text>
  <text x="60" y="554" font-size="12.5" fill="#7f1d1d">Screening (the ethical wall) is a professional obligation under the rules of conduct. A breach can disqualify the firm from the matter and</text>
  <text x="60" y="572" font-size="12.5" fill="#7f1d1d">expose it to malpractice. The audit log is the evidence a court or bar reviewer would demand — provable, not promised.</text>

  <text x="620" y="612" text-anchor="middle" font-size="12" fill="#94a3b8">Same engine, same chokepoint as the family build — only the principals (matters) and the stakes change.</text>
</svg>
