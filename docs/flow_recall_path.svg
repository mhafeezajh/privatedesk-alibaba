<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/></marker><marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/></marker></defs><rect x="0" y="0" width="900" height="760" fill="#ffffff"/><text x="450.0" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Bounded Recall (Read Path)</text><text x="450.0" y="60" text-anchor="middle" font-size="13" fill="#64748b">even with hundreds of stored memories, only a handful enter the prompt</text><rect x="145.0" y="92" width="430" height="52" rx="9" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/><circle cx="163.0" cy="110" r="11" fill="#cbd5e1"/><text x="163.0" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text><text x="360" y="123.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e293b">Incoming user query</text><rect x="145.0" y="174" width="430" height="52" rx="9" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/><circle cx="163.0" cy="192" r="11" fill="#0ea5e9"/><text x="163.0" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text><text x="360" y="196.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0369a1">Embed query</text><text x="360" y="214.0" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">text-embedding-v4 · 1024-d</text><line x1="360" y1="144" x2="360" y2="174" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><rect x="145.0" y="256" width="430" height="52" rx="9" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/><circle cx="163.0" cy="274" r="11" fill="#0d9488"/><text x="163.0" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text><text x="360" y="278.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f766e">Namespace-scoped search</text><text x="360" y="296.0" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">Qdrant · filter: namespace + status=active · limit K_CANDIDATES=20</text><line x1="360" y1="226" x2="360" y2="256" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><rect x="145.0" y="338" width="430" height="52" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/><circle cx="163.0" cy="356" r="11" fill="#6366f1"/><text x="163.0" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4</text><text x="360" y="360.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#3730a3">Rerank candidates</text><text x="360" y="378.0" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">0.6·similarity + 0.25·salience + 0.15·recency</text><line x1="360" y1="308" x2="360" y2="338" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><rect x="145.0" y="420" width="430" height="52" rx="9" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/><circle cx="163.0" cy="438" r="11" fill="#f59e0b"/><text x="163.0" y="442" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">5</text><text x="360" y="442.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#b45309">Take top K_CONTEXT=6</text><text x="360" y="460.0" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">under recall token budget — this IS bounded recall</text><line x1="360" y1="390" x2="360" y2="420" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><rect x="145.0" y="502" width="430" height="52" rx="9" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/><circle cx="163.0" cy="520" r="11" fill="#cbd5e1"/><text x="163.0" y="524" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">6</text><text x="360" y="524.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e293b">Update last_used_at</text><text x="360" y="542.0" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">recency feedback for future ranking</text><line x1="360" y1="472" x2="360" y2="502" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><rect x="145.0" y="584" width="430" height="52" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/><circle cx="163.0" cy="602" r="11" fill="#10b981"/><text x="163.0" y="606" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">7</text><text x="360" y="606.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#065f46">Audit + emit recall trace</text><text x="360" y="624.0" text-anchor="middle" font-size="11" font-weight="400" fill="#64748b">candidates → selected → token count (shown in inspector)</text><line x1="360" y1="554" x2="360" y2="584" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><rect x="660" y="300" width="210" height="150" rx="10" fill="#fffbeb" stroke="#f59e0b"/><text x="765" y="326" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">Why it matters</text><text x="765" y="352" text-anchor="middle" font-size="11" font-weight="400" fill="#92400e">Store can hold 100s</text><text x="765" y="370" text-anchor="middle" font-size="11" font-weight="400" fill="#92400e">of memories per principal.</text><text x="765" y="392" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Only the 6 most relevant</text><text x="765" y="410" text-anchor="middle" font-size="11" font-weight="400" fill="#92400e">reach the model — context</text><text x="765" y="428" text-anchor="middle" font-size="11" font-weight="400" fill="#92400e">stays small + on-budget.</text></svg>