services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: privatedesk
      POSTGRES_PASSWORD: privatedesk
      POSTGRES_DB: privatedesk
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privatedesk"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports: ["6333:6333"]
    volumes: ["qdrantdata:/qdrant/storage"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build: ./api
    env_file: .env
    environment:
      POSTGRES_DSN: postgresql+asyncpg://privatedesk:privatedesk@postgres:5432/privatedesk
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    # host.docker.internal lets the LOCAL/Ollama path reach the host
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports: ["3000:3000"]
    depends_on:
      - api

volumes:
  pgdata:
  qdrantdata:
