<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 760" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/></marker><marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/></marker></defs><rect x="0" y="0" width="1080" height="760" fill="#ffffff"/><text x="540.0" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Chat Turn — End-to-End Sequence</text><text x="540.0" y="60" text-anchor="middle" font-size="13" fill="#64748b">recall → compose → stream → async write → human-in-the-loop</text><rect x="15" y="96" width="190" height="34" rx="8" fill="#eef2ff" stroke="#6366f1"/><text x="110" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">Frontend</text><line x1="110" y1="130" x2="110" y2="700" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4"/><rect x="235" y="96" width="190" height="34" rx="8" fill="#eef2ff" stroke="#6366f1"/><text x="330" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">Chat router</text><line x1="330" y1="130" x2="330" y2="700" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4"/><rect x="445" y="96" width="190" height="34" rx="8" fill="#eef2ff" stroke="#6366f1"/><text x="540" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">Memory engine</text><line x1="540" y1="130" x2="540" y2="700" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4"/><rect x="665" y="96" width="190" height="34" rx="8" fill="#eef2ff" stroke="#6366f1"/><text x="760" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">LiteLLM → Qwen</text><line x1="760" y1="130" x2="760" y2="700" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4"/><rect x="875" y="96" width="190" height="34" rx="8" fill="#eef2ff" stroke="#6366f1"/><text x="970" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">Qdrant + Postgres</text><line x1="970" y1="130" x2="970" y2="700" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4"/><line x1="110" y1="170" x2="330" y2="170" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="220.0" y="162" text-anchor="middle" font-size="10.5" font-weight="400" fill="#64748b">POST /api/chat {message}</text><line x1="330" y1="216" x2="970" y2="216" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="650.0" y="208" text-anchor="middle" font-size="10.5" font-weight="400" fill="#64748b">persist user message</text><line x1="330" y1="262" x2="540" y2="262" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="435.0" y="254" text-anchor="middle" font-size="10.5" font-weight="400" fill="#64748b">recall(principal, query)</text><line x1="540" y1="308" x2="760" y2="308" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="650.0" y="300" text-anchor="middle" font-size="10.5" font-weight="400" fill="#64748b">embed query</text><line x1="540" y1="354" x2="970" y2="354" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="755.0" y="346" text-anchor="middle" font-size="10.5" font-weight="400" fill="#64748b">namespace-scoped search → rerank → top-6</text><line x1="540" y1="400" x2="330" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="435.0" y="392" text-anchor="middle" font-size="10.5" font-weight="400" fill="#64748b">bounded memories + trace</text><line x1="330" y1="446" x2="110" y2="446" stroke="#10b981" stroke-width="2" marker-end="url(#ag)"/><text x="220.0" y="438" text-anchor="middle" font-size="10.5" font-weight="400" fill="#10b981">SSE: recall trace (first event)</text><line x1="330" y1="492" x2="760" y2="492" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="545.0" y="484" text-anchor="middle" font-size="10.5" font-weight="400" fill="#64748b">compose persona prompt + stream</text><line x1="760" y1="538" x2="110" y2="538" stroke="#10b981" stroke-width="2" marker-end="url(#ag)"/><text x="435.0" y="530" text-anchor="middle" font-size="10.5" font-weight="400" fill="#10b981">SSE: streamed tokens</text><line x1="330" y1="584" x2="540" y2="584" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="435.0" y="576" text-anchor="middle" font-size="10.5" font-weight="400" fill="#64748b">write_memories (async)</text><line x1="540" y1="630" x2="970" y2="630" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="755.0" y="622" text-anchor="middle" font-size="10.5" font-weight="400" fill="#64748b">extract · embed · dedup · persist</text><line x1="330" y1="676" x2="110" y2="676" stroke="#10b981" stroke-width="2" marker-end="url(#ag)"/><text x="220.0" y="668" text-anchor="middle" font-size="10.5" font-weight="400" fill="#10b981">SSE: proposed_action (HITL, if any)</text></svg>